<!DOCTYPE html>
<html>
<head>
<title>Quotes Chatbot</title>

<style>

body{
margin:0;
font-family:Arial;
background:#343541;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#chat{
width:420px;
height:600px;
background:#444654;
border-radius:10px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

#header{
background:#202123;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

#messages{
flex:1;
overflow-y:auto;
padding:15px;
}

.message{
padding:10px 15px;
margin:8px 0;
border-radius:10px;
max-width:75%;
}

.user{
background:#10a37f;
color:white;
margin-left:auto;
}

.bot{
background:#202123;
color:white;
margin-right:auto;
}

#emotion{
text-align:center;
color:#ddd;
font-size:14px;
padding:5px;
}

#typing{
color:#aaa;
font-size:13px;
padding-left:10px;
display:none;
}

#inputArea{
display:flex;
border-top:1px solid #555;
}

#msg{
flex:1;
padding:12px;
border:none;
outline:none;
background:#40414f;
color:white;
}

button{
background:#10a37f;
border:none;
color:white;
padding:12px 15px;
cursor:pointer;
}

button:hover{
background:#0e8a6a;
}

</style>

</head>

<body>

<div id="chat">

<div id="header">🤖 Quotes Chatbot</div>

<div id="emotion"></div>

<div id="messages"></div>

<div id="typing">Bot is typing...</div>

<div id="inputArea">

<input id="msg" placeholder="Type message..." onkeypress="enterSend(event)">

<button onclick="sendMessage()">Send</button>

<button onclick="startVoice()">🎤</button>

</div>

</div>

<script>

function enterSend(e){
if(e.key==="Enter"){
sendMessage()
}
}

function detectEmotion(text){

let emotion="Neutral"

if(text.includes("sad") || text.includes("depressed")){
emotion="😢 Sad"
}

else if(text.includes("happy") || text.includes("great")){
emotion="😊 Happy"
}

else if(text.includes("motivate")){
emotion="🔥 Motivated"
}

document.getElementById("emotion").innerText="Detected Mood: "+emotion

}

function typeEffect(text){

let messages=document.getElementById("messages")

let div=document.createElement("div")

div.className="message bot"

messages.appendChild(div)

let i=0

let typing=setInterval(function(){

div.innerHTML+=text.charAt(i)

i++

if(i>=text.length){

clearInterval(typing)

}

},30)

messages.scrollTop=messages.scrollHeight

}

async function sendMessage(){

let input=document.getElementById("msg")

let message=input.value

if(message.trim()==="") return

detectEmotion(message)

let messages=document.getElementById("messages")

messages.innerHTML+=
"<div class='message user'>"+message+"</div>"

input.value=""

document.getElementById("typing").style.display="block"

let response=await fetch("http://localhost:5005/webhooks/rest/webhook",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
sender:"user",
message:message
})

})

let data=await response.json()

document.getElementById("typing").style.display="none"

typeEffect(data[0].text)

}

function startVoice(){

let recognition=new webkitSpeechRecognition()

recognition.lang="en-US"

recognition.onresult=function(event){

document.getElementById("msg").value=
event.results[0][0].transcript

sendMessage()

}

recognition.start()

}

</script>

</body>
</html>
